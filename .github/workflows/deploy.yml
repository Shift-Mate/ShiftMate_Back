name: Back Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/shiftmate-back
      BACK_ENV_FILE: /home/ubuntu/ShiftMate_Back/.env

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./ShiftMate_Back
          file: ./ShiftMate_Back/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          platforms: linux/amd64

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          BACK_ENV_FILE: ${{ env.BACK_ENV_FILE }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          envs: IMAGE_NAME,BACK_ENV_FILE
          script: |
            set -e
            # 서버 내 docker-compose.yml이 위치한 프로젝트 루트 폴더로 이동 
            cd /home/ubuntu/ShiftMate

            # MySQL/Redis 이미지로 생성된 컨테이너가 있으면 먼저 기동
            MYSQL_CONTAINER_ID=$(docker ps -aq --filter "ancestor=mysql:8.0" | head -n 1)
            if [ -n "$MYSQL_CONTAINER_ID" ]; then
              docker start "$MYSQL_CONTAINER_ID" >/dev/null
            fi

            REDIS_CONTAINER_ID=$(docker ps -aq --filter "ancestor=redis:7" | head -n 1)
            if [ -n "$REDIS_CONTAINER_ID" ]; then
              docker start "$REDIS_CONTAINER_ID" >/dev/null
            fi

            # 최신 이미지를 pull 받고 docker-compose로 재시작 (네트워크 자동 연결)
            docker-compose pull backend
            docker-compose up -d backend

            # 사용하지 않는 이전 도커 이미지 정리
            docker image prune -af
