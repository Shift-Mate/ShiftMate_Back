spring.application.name=ShiftMate
spring.config.import=optional:file:.env[.properties]

# Schema/data initialization defaults (safe for deployment)
# - Use profile overrides for local development seeding
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# Timezone (KST) consistency
# - Force DB session timezone to KST
# - Keep Hibernate/Jackson handling in KST
spring.datasource.hikari.connection-init-sql=SET time_zone = '+09:00'
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Seoul
spring.jackson.time-zone=Asia/Seoul

# JWT secret key configuration (secret must be at least 32 characters)
jwt.access-expiration=${JWT_ACCESS_EXPIRATION:3600000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}
jwt.secret=${JWT_SECRET}

# Redis host and port settings
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=${REDIS_TIMEOUT:2s}
# (Optional) Redis password configuration
# spring.data.redis.password=your_password

# CORS setting
cors.allowed-origins=https://shiftmate.shop,https://www.shiftmate.shop,http://localhost:3000,http://localhost:5173

# bizno api
#bizno.api.url=https://api.bizno.com/verify
bizno.api.url=https://bizno.net/api/fapi
bizno.api.key=${BIZNO_API_KEY}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true 
spring.mail.properties.mail.smtp.starttls.required=true

app.frontend-base-url=${FRONTEND_BASE_URL:https://shiftmate.shop}
app.mail.from=${MAIL_FROM:${MAIL_USERNAME}}


# Kakao OAuth
oauth.kakao.client-id=${KAKAO_CLIENT_ID}
oauth.kakao.client-secret=${KAKAO_CLIENT_SECRET}
oauth.kakao.redirect-uri=${KAKAO_REDIRECT_URI}
oauth.kakao.token-uri=https://kauth.kakao.com/oauth/token
oauth.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me

# Google OAuth
oauth.google.client-id=${GOOGLE_CLIENT_ID}
oauth.google.client-secret=${GOOGLE_CLIENT_SECRET}
oauth.google.redirect-uri=${GOOGLE_REDIRECT_URI}
oauth.google.token-uri=https://oauth2.googleapis.com/token
oauth.google.user-info-uri=https://openidconnect.googleapis.com/v1/userinfo

# multipart 업로드 크기 제한
# - 파일 1개 최대 10MB
# - 요청 전체도 10MB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# 로컬 파일 저장 루트 경로
# - 개발/로컬에서는 ./uploads 밑에 저장
# - 배포 환경에서는 env로 오버라이드 가능
app.upload.local-dir=${UPLOAD_LOCAL_DIR:./uploads}

# 파일 접근용 base URL
# - LocalFileStorageService에서 fileUrl 조합 시 사용
# - 나중에 nginx/cdn/s3로 전환 시 이 값만 바꿔도 됨
app.upload.base-url=${UPLOAD_BASE_URL:http://localhost:8081/uploads}

# 업로드 저장소 타입
# - local: 로컬 디스크 저장(LocalFileStorageService)
# - s3: AWS S3 저장(S3FileStorageService)
# 기본값은 local로 둬서 지금 로컬 개발이 깨지지 않게 한다.
app.upload.storage-type=${UPLOAD_STORAGE_TYPE:local}

# S3 버킷/리전/경로 prefix 설정
# - bucket: 업로드 대상 버킷 이름
# - region: 버킷이 있는 AWS 리전
# - prefix: 버킷 내부 폴더 루트(예: user-documents)
app.upload.s3.bucket=${S3_BUCKET:}
app.upload.s3.region=${S3_REGION:ap-northeast-2}
app.upload.s3.prefix=${S3_PREFIX:user-documents}

# (선택) CloudFront 또는 커스텀 CDN 도메인
# - 비워두면 기본 S3 URL을 사용
# - 값이 있으면 파일 URL을 해당 도메인 기준으로 조합
app.upload.s3.public-base-url=${S3_PUBLIC_BASE_URL:}

# AWS 자격증명 (로컬 테스트용)
# - 운영에서는 IAM Role(EC2/ECS/EKS) 사용 권장
# - 로컬 개발에서는 env로 키 주입
app.upload.s3.access-key=${AWS_ACCESS_KEY_ID:}
app.upload.s3.secret-key=${AWS_SECRET_ACCESS_KEY:}
