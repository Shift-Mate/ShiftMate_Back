spring.application.name=ShiftMate
spring.config.import=optional:file:.env[.properties]

# H2 or Any DB setting (If using Docker MySQL, make sure datasource url is configured elsewhere or add it here)
# Setting to allow data.sql to run after Hibernate creates the schema
spring.jpa.hibernate.ddl-auto=create
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true



# JWT secret key configuration (secret must be at least 32 characters)
jwt.access-expiration=${JWT_ACCESS_EXPIRATION:3600000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}
jwt.secret=${JWT_SECRET}

# Redis host and port settings
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=${REDIS_TIMEOUT:2s}

# (Optional) Redis password configuration
# spring.data.redis.password=your_password

# CORS setting
cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://3.37.128.149:3000

# bizno api
#bizno.api.url=https://api.bizno.com/verify
bizno.api.url=https://bizno.net/api/fapi
bizno.api.key=${BIZNO_API_KEY}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.frontend-base-url=${FRONTEND_BASE_URL:http://localhost:3000}
app.mail.from=${MAIL_FROM:${MAIL_USERNAME}}