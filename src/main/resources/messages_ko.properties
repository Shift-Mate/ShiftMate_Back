# 서버가 보내는 메일 문구용 다국어 리소스
# /auth/password-reset/request 요청의 언어(Locale) 를 보고 결정
# 브라우저가 보내는 Accept-Language 헤더(사용자 브라우저 언어)가 기준
# 브라우저 언어가 한국어(ko-KR) → 한국어 메일
# 브라우저 언어가 영어(en-US) → 영어 메일

mail.reset.subject=[ShiftMate] 비밀번호 재설정 안내
mail.reset.body.intro=아래 링크를 눌러 비밀번호를 재설정하세요.
mail.reset.body.expire=링크 유효시간: 30분

mail.signup.verify.subject=[ShiftMate] 회원가입 이메일 인증 코드
mail.signup.verify.body.intro=아래 인증 코드를 입력해 회원가입을 완료하세요.
mail.signup.verify.body.expire=인증 코드는 10분간 유효합니다.