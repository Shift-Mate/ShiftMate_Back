# 서버가 보내는 메일 문구용 다국어 리소스
# /auth/password-reset/request 요청의 언어(Locale) 를 보고 결정
# 브라우저가 보내는 Accept-Language 헤더(사용자 브라우저 언어)가 기준
# 브라우저 언어가 한국어(ko-KR) → 한국어 메일
# 브라우저 언어가 영어(en-US) → 영어 메일

mail.reset.subject=[ShiftMate] Password Reset
mail.reset.body.intro=Click the link below to reset your password.
mail.reset.body.expire=This link expires in 30 minutes.

mail.signup.verify.subject=[ShiftMate] Email Verification Code
mail.signup.verify.body.intro=Enter the verification code below to complete sign up.
mail.signup.verify.body.expire=This code expires in 10 minutes.